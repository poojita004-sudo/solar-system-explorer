<!DOCTYPE html>
<html>
<head>
<title>Solar System Explorer</title>

<style>



body{
   
background: linear-gradient(135deg,#020024,#090979,#000428);
color:white;
font-family:'Segoe UI',sans-serif;
text-align:center;
padding:20px;
margin:0;
}

h1{
font-size:50px;
color:#ffd700;
margin-bottom:10px;

}

h2{
color:#00d4ff;
}

h3{
color:#ffffff;
}

button{
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
border:none;
padding:12px 24px;
margin:10px;
border-radius:25px;
font-size:16px;
cursor:pointer;
transition:0.3s;
box-shadow:0 4px 15px rgba(0,114,255,.4);
}

button:hover{
transform:translateY(-3px);
}

#info,
#comparison,
#answer{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:20px;
border-radius:20px;
margin:20px auto;
width:70%;
box-shadow:0 4px 20px rgba(0,0,0,.3);
}

input,select{
padding:12px;
border-radius:10px;
border:none;
margin:10px;
font-size:16px;
}

hr{
border:1px solid rgba(255,255,255,.2);
margin:40px 0;
}

#progress{
font-size:24px;
color:#00ff99;
}

.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);

background-size:
120px 120px,
180px 180px,
250px 250px;

background-position:
0 0,
50px 50px,
100px 100px;

opacity:0.3;
z-index:-1;
}
#planetImage{
display:block;
margin:20px auto;
width:350px;
height:350px;
object-fit:cover;
border-radius:20px;
box-shadow:0 0 20px #00d4ff;
}

</style>
</head>

<body>
    <div class="stars"></div>

<h1>🌌 Solar System Explorer</h1>
<p style="color:#ddd;font-size:20px;">
Interactive AI Learning Application for Space Education 🚀
</p>
<h3 id="progressText">Progress: 0%</h3>

<div style="
width:70%;
height:25px;
background:#333;
margin:auto;
border-radius:20px;
overflow:hidden;">
</div>

<div id="progressBar"
style="
height:100%;
width:0%;
background:linear-gradient(90deg,#00ff99,#00d4ff);">

</div>

<button onclick="showPlanet('Mercury')">Mercury</button>
<button onclick="showPlanet('Venus')">Venus</button>
<button onclick="showPlanet('Earth')">Earth</button>
<button onclick="showPlanet('Mars')">Mars</button>

<button onclick="showPlanet('Jupiter')">Jupiter</button>
<button onclick="showPlanet('Saturn')">Saturn</button>
<button onclick="showPlanet('Uranus')">Uranus</button>
<button onclick="showPlanet('Neptune')">Neptune</button>
<img id="planetImage" width="300">
<h2 id="info"></h2>

<script>
  

let completed = 0;

function updateProgress(){

completed += 20;

if(completed > 100){
completed = 100;
}

document.getElementById("progressText").innerHTML =
"Progress: " + completed + "%";

document.getElementById("progressBar").style.width =
completed + "%";

}
function showPlanet(name){
    

updateProgress();


const planets = {

Mercury:"Mercury is the closest planet to the Sun.",

Venus:"Venus is the hottest planet in our Solar System.",

Earth:"Earth is our home planet and supports life.",

Mars:"Mars is known as the Red Planet.",

Jupiter:"Largest planet in the Solar System.",

Saturn:"Known for its beautiful rings.",

Uranus:"Rotates on its side.",

Neptune:"Farthest planet from the Sun."

};
const facts = {

Mercury:"A year on Mercury is only 88 Earth days.",

Venus:"Venus spins backwards compared to most planets.",

Earth:"Earth is the only known planet with life.",

Mars:"Mars has the largest volcano in the Solar System.",

Jupiter:"Jupiter has over 90 moons.",

Saturn:"Saturn could float in water.",

Uranus:"Uranus rotates almost sideways.",

Neptune:"Neptune has the fastest winds."

};
const images = {

Mercury:"https://upload.wikimedia.org/wikipedia/commons/4/4a/Mercury_in_true_color.jpg",

Venus:"https://upload.wikimedia.org/wikipedia/commons/e/e5/Venus-real_color.jpg",

Earth:"https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg",

Mars:"https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg",

Jupiter:"https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg",

Saturn:"https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg",

Uranus:"https://upload.wikimedia.org/wikipedia/commons/3/3d/Uranus2.jpg",

Neptune:"https://upload.wikimedia.org/wikipedia/commons/5/56/Neptune_Full.jpg"

};

document.getElementById("info").innerHTML =
planets[name] +
"<br><br>🌟 Fun Fact: " +
facts[name];

if(images[name]){
document.getElementById("planetImage").src =
images[name];
}

}

function checkAnswer(answer){

if(answer==="Mars"){

document.getElementById("quizResult").innerHTML =
"✅ Correct Answer";

updateProgress();

}
else{

document.getElementById("quizResult").innerHTML =
"❌ Wrong Answer";

}

}
async function askAI(){

const question =
document.getElementById("question").value.toLowerCase();

let answer = "";

if(question.includes("first planet")){
answer = "Mercury is the first planet from the Sun.";
}
else if(question.includes("earth")){
answer = "Earth is the third planet from the Sun and supports life.";
}
else if(question.includes("mars")){
answer = "Mars is called the Red Planet.";
}
else if(question.includes("jupiter")){
answer = "Jupiter is the largest planet in the Solar System.";
}
else if(question.includes("saturn")){
answer = "Saturn is famous for its rings.";
}
else if(question.includes("uranus")){
answer = "Uranus rotates on its side.";
}
else if(question.includes("neptune")){
answer = "Neptune is the farthest planet from the Sun.";
}
else{
answer = "Please ask about Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus or Neptune.";
}

document.getElementById("answer").innerHTML = answer;

updateProgress();

}

function comparePlanets(){


let p1 =
document.getElementById("planet1").value;

let p2 =
document.getElementById("planet2").value;

document.getElementById("comparison").innerHTML =
"<h3>" + p1 + " vs " + p2 + "</h3>" +
"<p>Both are unique planets in our Solar System.</p>";
 if(p1 === p2){
comparison.innerHTML =
"Please select two different planets.";
}

}

</script>

<hr>

<h2>Solar System Quiz</h2>

<p>Which planet is called the Red Planet?</p>

<button onclick="checkAnswer('Mars')">Mars</button>

<button onclick="checkAnswer('Earth')">Earth</button>

<button onclick="checkAnswer('Venus')">Venus</button>

<div id="quizResult"></div>
<hr>

<h2>🤖 AI Space Tutor</h2>

<input
id="question"
type="text"
placeholder="Ask about planets..."
style="width:300px;padding:10px;">

<button onclick="askAI()">
Ask AI
</button>

<div id="answer"></div>
<hr>

<h2>🪐 Planet Comparison</h2>

<select id="planet1">
  <option>Earth</option>
  <option>Mars</option>
  <option>Jupiter</option>
  <option>Saturn</option>
</select>

<select id="planet2">
  <option>Mars</option>
  <option>Earth</option>
  <option>Jupiter</option>
  <option>Saturn</option>
</select>

<button onclick="comparePlanets()">
Compare
</button>

<div id="comparison"></div>
<hr>

<h3>🚀 Developed by Poojita</h3>

<p>Interactive AI Learning App</p>

</body>
</html>
